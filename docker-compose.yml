services:
  postgres:
    image: postgres:16-alpine
    container_name: doai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doai_password}
      POSTGRES_DB: ${POSTGRES_DB:-doai_classroom}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - doai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doai_user} -d ${POSTGRES_DB:-doai_classroom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doai_redis
    ports:
      - "6379:6379"
    networks:
      - doai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doai_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-doai_user}:${POSTGRES_PASSWORD:-doai_password}@postgres:5432/${POSTGRES_DB:-doai_classroom}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - doai_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doai_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - doai_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  doai_network:
    driver: bridge
